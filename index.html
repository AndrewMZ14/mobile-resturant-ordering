<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Resturant Ordering App</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div>
        <header>
            <h1 class="title">Jimmy’s Diner</h1>
            <p class="motto">The best burgers and pizzas in town.</p>
        </header>
        <main id="main-content">
            <div class="menu-items" id="menu-items">
            </div>

            <div class="order-details" id="order-details">
                
            </div>

        </main>

        <div class="payment-modal" id="payment-modal">
            <p class="payment-title">Enter card details</p>
         
            <form id="payment-form">
            <input class="payment-input"
                    name="name"
                    id="name"
                    placeholder="Enter your name"
                    required>

            <input class="payment-input"
                    name="card-number"
                    id="card-number"
                    placeholder="Enter card number"
                    required>

            <input class="payment-input"
                    name="ccv"
                    id="ccv"
                    placeholder="Enter CVV"
                    required>

            <button type="submit" class="pay-btn">Pay</button>
            </form>
        </div>
        
    </div>
    <script src="index.js" type="module"></script>
</body>
</html>
